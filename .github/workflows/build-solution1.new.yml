name: Build Solution1 A+B

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
  repository_dispatch:
    types: [ repob_push_main ]

jobs:
  build_ab:
    runs-on: windows-2022

    steps:
      - name: Checkout repoA_migrated_from_svn
        uses: actions/checkout@v4
        with:
          path: repoA_migrated_from_svn

      - name: Checkout repoB_migrated_from_svn
        uses: actions/checkout@v4
        with:
          repository: w-yuan-quadient/repoB_migrated_from_svn
          path: repoB_migrated_from_svn
          token: ${{ secrets.REPO_ACCESS_TOKEN }}

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build Solution1
        shell: pwsh
        run: |
          msbuild repoA_migrated_from_svn\Solution1_AB.sln /m /p:Configuration=Release /p:Platform=x64

      - name: Package A and B artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force artifacts\VectorAdd\include, artifacts\VectorAdd\lib, artifacts\VectorAdd\bin | Out-Null
          New-Item -ItemType Directory -Force artifacts\VectorMul\include, artifacts\VectorMul\lib, artifacts\VectorMul\bin | Out-Null

          Copy-Item repoA_migrated_from_svn\VectorAdd\VectorAdd.h artifacts\VectorAdd\include\
          Copy-Item repoA_migrated_from_svn\bin\x64\Release\VectorAdd.lib artifacts\VectorAdd\lib\
          Copy-Item repoA_migrated_from_svn\bin\x64\Release\VectorAdd.dll artifacts\VectorAdd\bin\

          Copy-Item repoB_migrated_from_svn\VectorMul\VectorMul.h artifacts\VectorMul\include\
          Copy-Item repoA_migrated_from_svn\bin\x64\Release\VectorMul.lib artifacts\VectorMul\lib\
          Copy-Item repoA_migrated_from_svn\bin\x64\Release\VectorMul.dll artifacts\VectorMul\bin\

      - name: Upload A+B artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vector-libs-x64-release
          path: artifacts

      - name: Notify repoC_migrated_from_svn build completed
        if: success()
        env:
          GH_TOKEN: ${{ secrets.REPOC_DISPATCH_TOKEN }}
        run: |
          curl --fail-with-body -L -X POST `
            -H "Accept: application/vnd.github+json" `
            -H "Authorization: Bearer $env:GH_TOKEN" `
            https://api.github.com/repos/w-yuan-quadient/repoC_migrated_from_svn/dispatches `
            -d '{"event_type":"repoa_build_success"}'
